<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Alay's Website</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #fff0f5 0%, #ffe4ec 100%);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            padding: 1.8rem;
            cursor: crosshair;
        }

        /* Main container - elegant glassmorphism */
        .dream-dashboard {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 245, 250, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 2.5rem;
            border: 2px solid rgba(255, 200, 220, 0.9);
            box-shadow: 0 30px 50px rgba(255, 105, 180, 0.2);
            padding: 1.8rem;
            transition: all 0.3s ease;
        }

        /* header style like "Nicole's Website" */
        .site-header {
            text-align: center;
            margin-bottom: 1.8rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px dashed #ffb7c5;
        }
        .site-header h1 {
            font-size: 2.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #d14781, #ff69b4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .site-header p {
            color: #b13e6b;
            font-size: 0.85rem;
            margin-top: 6px;
            opacity: 0.8;
        }

        /* Grid Layout - same as original but refined */
        .grid-pink {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            grid-auto-rows: auto;
        }

        /* Clickable tiles - only titles visible, images/content hidden */
        .pink-tile {
            background: rgba(255, 240, 245, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 1.5rem;
            padding: 1rem 0.8rem;
            text-align: center;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.02em;
            color: #b13e6b;
            border: 1px solid #ffb7c5;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 12px -6px rgba(255, 105, 180, 0.2);
        }

        /* All extra content (images, extra divs) inside tiles are hidden */
        .pink-tile .image-container,
        .pink-tile .hidden-stuff {
            display: none;
        }

        .pink-tile:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: #ff69b4;
            background: #fff0f5;
            box-shadow: 0 0 16px rgba(255, 105, 180, 0.3);
            color: #c2185b;
        }

        /* Special spans */
        .span-2 {
            grid-column: span 2;
        }

        /* Logo tile subtle gradient */
        .logo-tile {
            background: linear-gradient(135deg, #ffe4f0, #ffd9e8);
            font-size: 1.2rem;
            font-weight: 700;
            color: #d14781;
        }

        /* Responsive */
        @media (max-width: 780px) {
            .grid-pink {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.8rem;
            }
            .span-2 {
                grid-column: span 2;
            }
            .dream-dashboard {
                padding: 1rem;
            }
            .site-header h1 {
                font-size: 1.6rem;
            }
        }

        /* Feedback bar */
        .feedback-bar {
            margin-top: 1.8rem;
            background: rgba(255, 220, 230, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 0.7rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
            border: 1px solid #ff99bb;
        }

        .toast-pink {
            color: #b13e6b;
            font-weight: 500;
            font-size: 0.85rem;
        }

        .reset-pink {
            background: none;
            border: 1px solid #ff69b4;
            padding: 0.4rem 1.2rem;
            border-radius: 2rem;
            color: #d14781;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .reset-pink:hover {
            background: #ff69b4;
            color: white;
            box-shadow: 0 0 8px #ff99bb;
        }

        /* Glitch animation */
        @keyframes glitchPop {
            0% { transform: translate(0); }
            25% { transform: translate(-2px, 1px); text-shadow: -1px 0 #ff69b4; }
            50% { transform: translate(2px, -1px); text-shadow: 1px 0 #ffffff; }
            100% { transform: translate(0); }
        }

        .glitch-click {
            animation: glitchPop 0.2s ease-in-out;
        }

        /* ZOOM MODAL (popup with zoom effect) */
        .modal-pink {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 200, 210, 0.96);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            cursor: pointer;
        }

        .modal-pink.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-card-pink {
            max-width: 550px;
            width: 90%;
            background: #fff5fa;
            border-radius: 2rem;
            border: 2px solid #ff99bb;
            padding: 1.8rem;
            text-align: left;
            box-shadow: 0 0 40px rgba(255, 105, 180, 0.4);
            transform: scale(0.7) translateY(30px);
            transition: transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-pink.active .modal-card-pink {
            transform: scale(1) translateY(0);
        }

        .modal-card-pink h3 {
            font-size: 1.6rem;
            margin-bottom: 0.8rem;
            color: #c2185b;
            border-left: 5px solid #ff69b4;
            padding-left: 15px;
        }

        .modal-card-pink p, .modal-card-pink div.info-text {
            color: #a13e63;
            line-height: 1.5;
            margin-bottom: 0.7rem;
            font-size: 0.95rem;
        }

        .modal-card-pink .section-title {
            font-weight: 700;
            color: #d14781;
            margin-top: 10px;
            margin-bottom: 4px;
            font-size: 1rem;
        }

        .modal-close-pink {
            background: #ff99bb;
            border: none;
            margin-top: 1.2rem;
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
            color: #5a2a3e;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .modal-close-pink:hover {
            background: #ff69b4;
            color: white;
        }

        hr {
            margin: 10px 0;
            border-color: #ffc0cb;
        }
        
        .center-text {
            text-align: center;
        }
        
        /* Round logo styling inside modal */
        .modal-round-img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #ff99bb;
            margin: 0 auto;
            display: block;
            box-shadow: 0 8px 20px rgba(255,105,180,0.3);
        }
        
        .modal-env-img, .modal-street-img {
            max-width: 100%;
            border-radius: 1rem;
            border: 2px solid #ffb7c5;
            max-height: 220px;
            object-fit: cover;
        }
        
        .modal-gallery {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .modal-gallery img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 20px;
            border: 2px solid #ffb7c5;
        }
    </style>
</head>
<body>

<div class="dream-dashboard">
    <!-- Header like "Nicole's Website" but personalized -->
    <div class="site-header">
        <h1>🌸 ALAY'S WEBSITE 🌸</h1>
        <p>click any tile → reveal the magic within ✨</p>
    </div>

    <div class="grid-pink">
        <!-- LOGO tile - only text visible, hidden content appears in modal (bilog yung logo) -->
        <div class="pink-tile logo-tile" data-id="logo">

        </div>

    <div class="feedback-bar">

</div>

<!-- ZOOM MODAL -->
<div id="pinkModal" class="modal-pink">
    <div class="modal-card-pink" id="modalContent">
        <!-- dynamic content -->
    </div>
</div>

<script>
    // Detailed content for each tile (all hidden until click)
    // Logo includes circular image (bilog)
    const tileDetails = {
        logo: {
            title: "🌸 Alhaizalyn 'Alay' Tuazon",
            html: `
                <div class="info-text center-text"><strong>✨ The Blossom Within ✨</strong><br>
                This logo represents growth, resilience, and the beauty of self-discovery. Alay's journey — from San Mateo to becoming a future educator and artist.<br><br>
                <em>"Striving to become better every day."</em></div>
                <div class="center-text">
                    <img src="logo.jpeg" alt="Alay Circular Logo" class="modal-round-img" onerror="this.src='https://placehold.co/200x200/FFB7C5/FFFFFF?text=🌸+ALAY+🌸'">
                </div>
                <hr>
                <div class="info-text">💖 Core values: Passion, Kindness, Determination 💖</div>
            `
        },
        about: {
            title: "👤 ABOUT ME • Alhaizalyn 'Alay' Tuazon",
            html: `
                <div class="info-text"><strong>🌟 Full Name:</strong> Alhaizalyn “Alay” Tuazon</div>
                <div class="info-text"><strong>🎂 Age:</strong> 19 years old</div>
                <div class="info-text"><strong>📍 From:</strong> San Mateo, Rizal</div>
                <div class="info-text"><strong>📚 BEED student</strong> (Bachelor of Elementary Education)</div>
                <div class="info-text"><strong>🏅 Consistent honor student</strong> — dedicated to excellence</div>
                <div class="info-text"><strong>💪 Self-supporting:</strong> selling while studying, turning challenges into strength</div>
                <div class="info-text"><strong>🌱 Passionate about learning and self-growth</strong> — striving to become better every day.</div>
                <div class="section-title">🎤 Hobbies:</div>
                <div>🎵 Singing &nbsp;|&nbsp; 🛍️ Selling (creative entrepreneur)</div>
                <div class="section-title">🎵 Favorite song:</div>
                <div>“Risk It All” — an anthem of courage</div>
                <div class="section-title">🎬 Favorite movie:</div>
                <div>“Four Sisters in a Wedding” — family, love, and laughter</div>
                <hr>
                <div><em>“Every small step leads to a brighter tomorrow.” — Alay</em></div>
            `
        },
        contact: {
            title: "📞 CONTACT INFORMATION • Let's Connect",
            html: `
                <div class="info-text"><strong>📧 Email:</strong> <a href="mailto:alhaizalynt@gmail.com" style="color:#d14781;">alhaizalynt@gmail.com</a></div>
                <div class="info-text"><strong>📷 Instagram:</strong> your_Alaycxzc</div>
                <div class="info-text"><strong>💬 DM open for collaborations, creative projects, or just a friendly hello!</strong></div>
                <div>🌸 “Your message could spark something magical.” 🌸</div>
            `
        },
        goals: {
            title: "🎯 MY GOALS • Vision & Mission",
            html: `
                <div class="info-text"><strong>✨ To continue growing academically and personally ✨</strong><br>
                While building the skills I need to succeed and inspire others.<br><br>

                • Graduate with honors and become an inspiring educator.<br>
                • Empower fellow students through self-development.<br>
                • Balance studies, business, and creativity.<br>
                • Leave a positive impact on everyone I meet.<br><br>
                💖 <em>"Success isn't just about achievements — it's about lifting others as you rise."</em></div>
                <hr>
                <div>📚 Short-term: excel in BEED, grow my small business. 🚀 Long-term: become a teacher who changes lives.</div>
            `
        },
        future: {
            title: "🔮 MY FUTURE ME • Dream Reality",
            html: `
                <div class="info-text"><strong>🌟 I see myself as a successful and independent individual, achieving my goals while inspiring others through my journey.</strong></div>

                <div>🌸 A future where I’ve built my dream classroom, published stories of resilience, and continue to shine as a self-made woman. My future self is confident, kind, and a beacon of hope for young learners.</div>
                <div><br>🏆 “From San Mateo to the world — I’ll keep inspiring, one step at a time.”</div>
            `
        },
        environment: {
            title: "🌿 ENVIRONMENT • One Image, Infinite Care",
            html: `
                <div class="center-text"><img src="environment.jpeg" alt="Environment green scenery" class="modal-env-img" style="max-width:100%; border-radius:1rem;" onerror="this.src='https://placehold.co/500x280/FFC0CB/FFFFFF?text=🌍+Preserve+Nature+🌍'"></div>
                <div class="info-text"><em>Just a single picture speaks a thousand words. Let's protect our home — for us and future generations.</em></div>
                <div>🌱 No extra text, just pure appreciation for Mother Earth.</div>
            `
        },
        street: {
            title: "📸 STREET PHOTOGRAPHY • 'Uwian' Story",
            html: `
                <div class="center-text"><img src="street.jpeg" alt="Uwian moment of SMMC students" class="modal-street-img" style="max-width:100%; border-radius:1rem;" onerror="this.src='https://placehold.co/500x280/FFB6C1/FFFFFF?text=🚶‍♀️+SMMC+Students+Walking+Home+🚶'"></div>
                <div class="info-text"><strong>📖 My photo shows the “uwian” moment of SMMC students walking home together, capturing friendship and the real daily life of students.</strong></div>
                <div class="info-text">✨ <strong>Why I chose this subject:</strong> It’s natural, relatable, and shows how students bond after class.</div>
                <div class="info-text">🎯 <strong>Why the photo is effective:</strong> Because of the natural lighting, good timing, and the relaxed emotions of the students.</div>
                <div class="info-text">⚠️ <strong>My challenges:</strong> The moving crowd, strong sunlight, background distractions, and feeling shy that they might get annoyed.</div>
                <hr>
                <div>💕 Despite the struggles, this image reflects authentic student life — genuine connections and the beauty of simple moments.</div>
            `
        },
        thankyou: {
            title: "✨ THANK YOU! ✨",
            html: `
                <div class="info-text"><strong>💖 Infinite gratitude for exploring my universe 💖</strong><br>
                Your curiosity means the world to me. Keep dreaming, keep striving, and always remember:<br><br>
                🌸 <em>"Every small act of courage leads to extraordinary destinations."</em><br><br>
                — Alhaizalyn “Alay” Tuazon</div>
                <div class="modal-gallery">
                    <img src="ty1.jpeg" alt="Thank you 1" onerror="this.src='https://placehold.co/100x100/FF9EBB/FFFFFF?text=❤️'">
                    <img src="ty2.jpeg" alt="Thank you 2" onerror="this.src='https://placehold.co/100x100/FFB7C5/FFFFFF?text=🌸'">
                    <img src="ty3.jpeg" alt="Thank you 3" onerror="this.src='https://placehold.co/100x100/FFC0E0/FFFFFF?text=✨'">
                </div>
                <div class="info-text center-text" style="margin-top:15px;">You are appreciated! Come back anytime 💕</div>
            `
        }
    };

    // Particle effect
    function createPinkParticle(x, y) {
        const particle = document.createElement('div');
        particle.style.position = 'fixed';
        particle.style.width = '8px';
        particle.style.height = '8px';
        particle.style.background = '#ff99bb';
        particle.style.borderRadius = '50%';
        particle.style.pointerEvents = 'none';
        particle.style.left = (x - 4) + 'px';
        particle.style.top = (y - 4) + 'px';
        particle.style.zIndex = '9999';
        particle.style.boxShadow = '0 0 10px #ff69b4';
        document.body.appendChild(particle);
        let opacity = 1;
        let scale = 1;
        const interval = setInterval(() => {
            if (opacity <= 0) {
                clearInterval(interval);
                particle.remove();
                return;
            }
            opacity -= 0.05;
            scale += 0.2;
            particle.style.opacity = opacity;
            particle.style.transform = `scale(${scale})`;
        }, 20);
        setTimeout(() => {
            clearInterval(interval);
            if(particle) particle.remove();
        }, 400);
    }

    // Animate tile
    function animateTile(tile) {
        tile.classList.add('glitch-click');
        setTimeout(() => tile.classList.remove('glitch-click'), 250);
        tile.style.borderColor = '#ff69b4';
        setTimeout(() => { tile.style.borderColor = ''; }, 200);
    }

    // Update toast
    function updateToast(tileId) {
        const toastDiv = document.getElementById('toastMsg');
        const msgs = {
            about: "👤 ABOUT ME — Alay's full story revealed!",
            contact: "📞 CONTACT INFO — let's connect!",
            goals: "🎯 MY GOALS — inspiring growth!",
            future: "🔮 MY FUTURE ME — bright vision!",
            environment: "🌿 ENVIRONMENT — peaceful image appears.",
            street: "📸 STREET PHOTOGRAPHY — uwian story unfolds!",
            logo: "🌸 LOGO — circular emblem revealed!",
            thankyou: "✨ THANK YOU! triple gratitude images pop!"
        };
        toastDiv.innerHTML = `💖 ${msgs[tileId] || 'hidden magic unlocked!'} 💖`;
        toastDiv.classList.add('glitch-click');
        setTimeout(() => toastDiv.classList.remove('glitch-click'), 300);
    }

    let activeModal = null;
    function showZoomModal(tileId) {
        const data = tileDetails[tileId];
        if (!data) return;
        const modal = document.getElementById('pinkModal');
        const modalContentDiv = document.getElementById('modalContent');
        modalContentDiv.innerHTML = `
            <h3>${data.title}</h3>
            ${data.html}
            <button class="modal-close-pink" id="dynamicCloseBtn">close ✨</button>
        `;
        modal.classList.add('active');
        activeModal = modal;
        const closeBtn = document.getElementById('dynamicCloseBtn');
        if (closeBtn) {
            closeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                closeZoomModal();
            });
        }
    }

    function closeZoomModal() {
        if (activeModal) {
            activeModal.classList.remove('active');
            activeModal = null;
        }
    }

    // Attach click events
    const allTiles = document.querySelectorAll('.pink-tile');
    allTiles.forEach(tile => {
        tile.addEventListener('click', (e) => {
            e.stopPropagation();
            let tileId = tile.getAttribute('data-id');
            if (!tileId) {
                const txt = tile.innerText.toLowerCase();
                if (txt.includes('logo')) tileId = 'logo';
                else if (txt.includes('about')) tileId = 'about';
                else if (txt.includes('contact')) tileId = 'contact';
                else if (txt.includes('goals')) tileId = 'goals';
                else if (txt.includes('future')) tileId = 'future';
                else if (txt.includes('environment')) tileId = 'environment';
                else if (txt.includes('street')) tileId = 'street';
                else if (txt.includes('thank')) tileId = 'thankyou';
                else tileId = 'about';
            }
            const x = e.clientX, y = e.clientY;
            createPinkParticle(x, y);
            animateTile(tile);
            updateToast(tileId);
            showZoomModal(tileId);
        });
    });

    // Reset button
    const resetBtn = document.getElementById('resetBtnPink');
    resetBtn.addEventListener('click', () => {
        closeZoomModal();
        const toastDiv = document.getElementById('toastMsg');
        toastDiv.innerHTML = "🌸 RESET AURA — fresh pink energy! Click any tile to reveal hidden content 🌸";
        toastDiv.classList.add('glitch-click');
        setTimeout(() => toastDiv.classList.remove('glitch-click'), 500);
        for(let i=0;i<12;i++) {
            setTimeout(() => {
                const randX = Math.random() * window.innerWidth;
                const randY = Math.random() * window.innerHeight;
                createPinkParticle(randX, randY);
            }, i * 40);
        }
    });

    // Close modal on overlay or escape
    const modalOverlay = document.getElementById('pinkModal');
    modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) closeZoomModal();
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && activeModal) closeZoomModal();
    });

    // Flash effect for street photography
    const streetTile = document.querySelector('[data-id="street"]');
    if(streetTile) {
        streetTile.addEventListener('click', () => {
            const flash = document.createElement('div');
            flash.style.position = 'fixed';
            flash.style.top = 0; flash.style.left = 0;
            flash.style.width = '100%'; flash.style.height = '100%';
            flash.style.backgroundColor = '#ffc0cb';
            flash.style.opacity = '0.25';
            flash.style.pointerEvents = 'none';
            flash.style.zIndex = '10001';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 150);
        });
    }
    
    console.log("💖 Format like Nicole's Website: clean header, hidden content on click, round logo, pink/white theme!");
</script>
</body>
</html>
